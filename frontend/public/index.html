<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberMaster - Reserva tu estilo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">
        <svg width="60" height="60" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="#1a6b5a"/>
          <circle cx="50" cy="50" r="40" fill="#f5efe0"/>
          <path d="M50 20 L55 35 L70 35 L58 45 L62 60 L50 50 L38 60 L42 45 L30 35 L45 35 Z" fill="#1a6b5a"/>
          <circle cx="50" cy="50" r="12" fill="#1a6b5a"/>
          <circle cx="50" cy="50" r="8" fill="#f5efe0"/>
          <circle cx="50" cy="50" r="4" fill="#1a6b5a"/>
        </svg>
      </div>
      <h1 class="loading-title">BarberMaster</h1>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-text">Preparando tu experiencia...</p>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#home" class="nav-logo">
        <svg width="32" height="32" viewBox="0 0 100 100" class="nav-logo-icon">
          <circle cx="50" cy="50" r="48" fill="#1a6b5a"/>
          <circle cx="50" cy="50" r="40" fill="#f5efe0"/>
          <path d="M50 20 L55 35 L70 35 L58 45 L62 60 L50 50 L38 60 L42 45 L30 35 L45 35 Z" fill="#1a6b5a"/>
          <circle cx="50" cy="50" r="12" fill="#1a6b5a"/>
          <circle cx="50" cy="50" r="8" fill="#f5efe0"/>
          <circle cx="50" cy="50" r="4" fill="#1a6b5a"/>
        </svg>
        <span class="nav-logo-text">BarberMaster</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="#home" class="nav-link">Inicio</a>
        <a href="#barbershops" class="nav-link">Barberías</a>
        <a href="#track" class="nav-link">Rastrear Reserva</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <div class="auth-nav" id="auth-nav">
          <a href="#login" class="btn btn-sm btn-outline" id="login-btn">Iniciar sesión</a>
          <div class="user-menu" id="user-menu" style="display:none">
            <a href="#dashboard" class="btn btn-sm btn-primary" id="dashboard-link">Panel</a>
            <button class="btn btn-sm btn-outline" id="logout-btn">Cerrar sesión</button>
          </div>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Main Content -->
  <main id="main-content" class="main-content"></main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content" id="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Scripts (v2 - cache busting) -->
  <script src="/js/api.js?v=2"></script>
  <script src="/js/auth.js?v=2"></script>
  <script src="/js/router.js?v=2"></script>
  <script src="/js/pages/home.js?v=2"></script>
  <script src="/js/pages/barbershops.js?v=2"></script>
  <script src="/js/pages/booking.js?v=2"></script>
  <script src="/js/pages/track.js?v=2"></script>
  <script src="/js/pages/login.js?v=2"></script>
  <script src="/js/pages/barbershop-dashboard.js?v=2"></script>
  <script src="/js/pages/admin-dashboard.js?v=2"></script>
  <script src="/js/app.js?v=2"></script>
</body>
</html>
